      <div class="p-6 md:p-10 pt-6">
        <div id="news-text" class="text-gray-700 text-base md:text-lg leading-[1.8] space-y-4 font-medium text-justify">

        <div class="mt-8 pt-6 border-t border-gray-50 flex flex-col sm:flex-row items-center justify-between gap-4">
