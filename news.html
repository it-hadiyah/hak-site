<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="أخبار ومبادرات شركة هدية الخير للاستثمار">
  <title>أرشيف الأخبار | هدية الخير</title>

  <!-- Favicon -->
  <link rel="icon" href="images/logo.png" type="image/png">
   <style>
     .footer-ltr{
           text-align: left !important;
       }
   </style>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Translations -->
  <script src="translations.js"></script>
</head>

<body class="text-gray-800 font-['Noto_Sans_Arabic']">

<!-- Header -->
<header class="bg-white/90 backdrop-blur border-b border-gray-100 sticky top-0 z-50">
  <div class="container mx-auto   h-16 flex items-center justify-between">

    <!-- Logo -->
    <a href="index.html#media" class="flex items-center gap-3">
      <div class="h-10 w-[210px]">
        <img src="images/logo.png" alt="شعار هدية الخير" class="h-full w-full object-contain">
      </div>
    </a>

    <!-- Actions -->
    <div class="flex items-center gap-3">

      <!-- Language Toggle -->
      <button id="langToggle"
              class="px-4 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 transition font-bold text-[#017768] text-sm">
        <span id="currentLang">EN</span>
      </button>

      <!-- Back Button -->
      <a href="index.html#media" id="backBtn"
         class="px-4 py-2 rounded-xl border border-gray-200 font-bold hover:bg-gray-50 transition flex items-center gap-2">
        <svg class="w-4 h-4 rtl:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        <span data-i18n="news.backBtn">رجوع</span>
      </a>

    </div>
  </div>
</header>

<!-- Main Content -->
<main class="py-12 md:py-20 bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 max-w-4xl">

    <!-- News Card -->
    <article class="bg-white shadow-xl rounded-[2rem] border border-gray-100 overflow-hidden transition-all duration-300">

      <!-- Header -->
      <div class="p-6 md:p-10 pb-4 md:pb-6">
        <div class="flex flex-wrap items-center gap-3 mb-4">
          <span id="news-category"
                class="px-3 py-1 rounded-lg bg-[#007361]/10 text-[#007361] text-xs font-bold uppercase tracking-wide"
                data-i18n="news.category">
            المركز الإعلامي
          </span>
          <span id="news-date"
                class="text-gray-400 text-xs md:text-sm font-medium border-r rtl:border-r pr-3 ltr:border-l ltr:pl-3 ltr:pr-0 border-gray-200">
          </span>
        </div>

        <h1 id="news-title"
            class="text-2xl md:text-4xl font-black text-[#007361] leading-snug">
        </h1>
      </div>

      <!-- Image -->
      <div class="px-6 md:px-10">
        <div class="relative h-56 md:h-96 w-full overflow-hidden rounded-2xl bg-gray-50 flex items-center justify-center border border-gray-100 shadow-inner">
          <img id="news-image"
               src=""
               alt="صورة الخبر"
               class="max-w-full max-h-full object-contain p-2 transition-transform duration-500 hover:scale-[1.02]"
               loading="lazy">
        </div>
      </div>

      <!-- Content -->
      <div class="p-6 md:p-10 pt-6">
        <div id="news-text"
             class="text-gray-700 text-base md:text-lg leading-[1.9] space-y-4 font-medium text-justify">
        </div>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4">

          <!-- Author -->
          <div class="flex items-center gap-2 text-gray-400 text-xs italic">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span data-i18n="news.publishedBy">نشر بواسطة القسم الإعلامي</span>
          </div>

          <!-- Share -->
          <div class="flex items-center gap-2">
            <span class="text-gray-400 text-xs" data-i18n="news.share">مشاركة الخبر</span>
            <button id="copyLink"
                    class="px-3 py-1.5 rounded-lg bg-[#017768]/10 text-[#017768] text-xs font-bold hover:bg-[#017768]/20 transition flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
              </svg>
              <span data-i18n="news.copyLink">نسخ الرابط</span>
            </button>
          </div>

        </div>
      </div>

    </article>

  </div>
</main>

<!-- Footer -->
<footer class="bg-[#014f45] text-white pt-14 pb-6">
  <div class="container mx-auto px-6">
    <div class="grid md:grid-cols-3 gap-10 text-center md:text-right">

      <!-- Logo + About -->
      <div class="space-y-4">
        <img src="images/logo_2.png" alt="شعار هدية الخير للاستثمار" class="h-16 mx-auto md:mx-0 object-contain">
        <p class="text-white/80 text-sm leading-relaxed" data-i18n="footer.about">
          شركة هدية الخير للاستثمار تقدم حلولاً استثمارية مبتكرة برؤية استراتيجية لتحقيق النمو والاستدامة.
        </p>
      </div>

      <!-- Quick Links -->
      <div>
        <h3 class="font-bold text-lg mb-4 text-[#b9995e]" data-i18n="footer.quickLinks">روابط سريعة</h3>
        <ul class="space-y-2 text-white/80">
          <li><a href="index.html#home" class="hover:text-[#b9995e] transition" data-i18n="nav.home">الرئيسية</a></li>
          <li><a href="index.html#about" class="hover:text-[#b9995e] transition" data-i18n="nav.about">من نحن</a></li>
          <li><a href="index.html#services" class="hover:text-[#b9995e] transition" data-i18n="nav.services">خدماتنا</a></li>
          <li><a href="index.html#contact" class="hover:text-[#b9995e] transition" data-i18n="nav.contact">تواصل معنا</a></li>
        </ul>
      </div>

      <!-- Social -->
      <div>
        <h3 class="font-bold text-lg mb-4 text-[#b9995e]" data-i18n="footer.follow">تابعنا</h3>
        <div class="flex justify-center md:justify-start gap-4">
          <a href="https://www.linkedin.com/in/hadiyahalkhair" target="_blank"
             class="bg-white/10 hover:bg-[#b9995e] transition p-3 rounded-full" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in text-white text-lg"></i>
          </a>
          <a href="https://x.com/Hadiyahalkhair" target="_blank"
             class="bg-white/10 hover:bg-[#b9995e] transition p-3 rounded-full" aria-label="X">
            <i class="fa-brands fa-x-twitter text-white text-lg"></i>
          </a>
          <a href="https://www.instagram.com/hadiyahalkhair/" target="_blank"
             class="bg-white/10 hover:bg-[#b9995e] transition p-3 rounded-full" aria-label="Instagram">
            <i class="fa-brands fa-instagram text-white text-lg"></i>
          </a>
          <a href="https://www.tiktok.com/@hadiyahalkhair" target="_blank"
             class="bg-white/10 hover:bg-[#b9995e] transition p-3 rounded-full" aria-label="TikTok">
            <i class="fa-brands fa-tiktok text-white text-lg"></i>
          </a>
        </div>
      </div>

    </div>

    <!-- Copyright -->
    <div class="border-t border-white/20 mt-10 pt-6 text-center text-sm text-white/70">
      © <span id="year">2026</span> <span data-i18n="footer.copyright">شركة هدية الخير للاستثمار. جميع الحقوق محفوظة.</span>
    </div>
  </div>
</footer>

<!-- Scripts -->
<script src="translations.js"></script>
<script src="script.js"></script>
<script src="i18n.js"></script>

</body>
</html>
